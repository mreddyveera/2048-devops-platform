apiVersion: v1
kind: ConfigMap

metadata:
  name: game-2048-config
  namespace: game-2048

  labels:
    app.kubernetes.io/name: game-2048
    app.kubernetes.io/component: configuration
    app.kubernetes.io/managed-by: kubectl

data:
  APP_ENV: "production"

  GAME_MODE: "single-player"

  LOG_LEVEL: "info"

  SERVER_PORT: "80"

  ENABLE_METRICS: "true"